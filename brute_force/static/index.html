<html lang="zh-CN">
<head>

    <title>弱口令暴力破解演示（体验）</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基础样式 */
        * {

            box-sizing: border-box;
        }

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;

        }

            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

    <!-- 视图容器 -->
    <div id="view-home" class="view">
        <!-- 首页内容 - Node 2-1 实现 -->
    </div>
    
    <div id="view-input" class="view hidden">
        <!-- 用户输入页内容 - Node 2-2 实现 -->

    <div id="view-cracking" class="view hidden">
        <!-- 破解过程展示页内容 - Node 3-1 实现 -->

    <div id="view-success" class="view hidden">
        <!-- 破解成功展示页内容 - Node 3-5 实现 -->
    </div>
    
    <div id="view-stopped" class="view hidden">
        <!-- 用户主动停止展示页内容 - Node 3-6 实现 -->
